<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉLITE PERFORMANCE - Athletecore Pro (MOCKUP DEMO)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mock customization overrides */
        body {
            overflow: auto;
            height: auto;
            min-height: 100vh;
        }
        
        /* Theme Light overrides for mock app controls box */
        body.theme-light {
            background: transparent;
            color: #1e293b !important;
        }
        body.theme-light #controlsBox {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05) !important;
            color: #1e293b !important;
        }
        body.theme-light #controlsBox h3,
        body.theme-light #controlsBox label,
        body.theme-light #controlsBox h4,
        body.theme-light #controlsBox .sim-radio-label {
            color: #1e293b !important;
        }
        body.theme-light #controlsBox select {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: #1e293b;
        }
        body.theme-light #controlsBox input[type="text"] {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: #1e293b;
        }
        
        .view-port {
            position: relative;
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: radial-gradient(circle at center, #0f2452 0%, #050811 100%);
        }
        #uiFloatingLayer {
            position: relative;
            padding: 20px 0;
            background: transparent;
            z-index: 5;
        }
        #controlsBox {
            background: rgba(16, 28, 48, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        .simulator-selector-panel {
            background: rgba(255, 145, 0, 0.08);
            border: 1px solid rgba(255, 145, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .simulator-selector-panel h4 {
            color: var(--accent-orange);
            font-size: 13px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sim-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .sim-radio-label {
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }
        .sim-radio-label input {
            accent-color: var(--accent-orange);
        }
        /* Glowing human outline overlay mockup */
        .glowing-skeleton-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 320px;
            opacity: 0.85;
            transition: all 0.5s ease;
        }
        .skeleton-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-blue);
        }
        .skeleton-line {
            position: absolute;
            background: var(--accent-teal);
            box-shadow: 0 0 8px var(--accent-teal);
            transform-origin: top left;
        }
        #gyroLevelContainer {
            z-index: 10;
        }
    </style>
</head>
<body>

<div style="padding: 20px; max-width: 900px; margin: 0 auto;">
    
    <h2 style="font-size:18px; color:var(--accent-teal); margin-bottom:15px; letter-spacing:1px; display:flex; align-items:center; gap:8px;">
        📐 ÉLITE PERFORMANCE <span class="badge" style="background:var(--accent-blue); color:#000; font-size:9px; padding:2px 6px; border-radius:4px; font-weight:700;">MOCK SIMULATOR</span>
    </h2>

    <!-- Simulated camera viewport -->
    <div class="view-port">
        <!-- Grid and visual guides -->
        <div class="info-panel" id="infoPanel" style="top:15px; left:15px;">
            <div class="status-indicator"></div>
            <span id="scaleStatus">📏 スケール未校正</span><br>
            <span id="pelvicStatus">📐 骨盤傾斜: 0°</span>
        </div>
        
        <div id="timerDisplay" class="timer-display" style="display:none;">REC 10.0s</div>
        
        <!-- Interactive Simulated Skeleton -->
        <div class="glowing-skeleton-overlay" id="skeletonOverlay">
            <svg width="100%" height="100%" viewBox="0 0 100 160">
                <!-- Head -->
                <circle cx="50" cy="18" r="7" fill="none" stroke="#00bfff" stroke-width="1.5" filter="drop-shadow(0 0 4px #00bfff)" />
                <!-- Spine/Trunk -->
                <line x1="50" y1="25" x2="50" y2="85" stroke="#64ffda" stroke-width="2" id="spineLine" />
                <!-- Shoulders -->
                <line x1="38" y1="32" x2="62" y2="32" stroke="#64ffda" stroke-width="2" id="shoulderLine" />
                <!-- Arms -->
                <line x1="38" y1="32" x2="28" y2="55" stroke="#64ffda" stroke-dasharray="2,2" stroke-width="1.5" />
                <line x1="62" y1="32" x2="72" y2="55" stroke="#64ffda" stroke-dasharray="2,2" stroke-width="1.5" />
                <!-- Hips -->
                <line x1="42" y1="85" x2="58" y2="85" stroke="#ff9100" stroke-width="2" id="hipLine" />
                <!-- Left Leg -->
                <line x1="42" y1="85" x2="38" y2="120" stroke="#39ff14" stroke-width="2" id="leftLegUpper" />
                <line x1="38" y1="120" x2="40" y2="150" stroke="#39ff14" stroke-width="2" id="leftLegLower" />
                <!-- Right Leg -->
                <line x1="58" y1="85" x2="62" y2="120" stroke="#39ff14" stroke-width="2" id="rightLegUpper" />
                <line x1="62" y1="120" x2="60" y2="150" stroke="#39ff14" stroke-width="2" id="rightLegLower" />
            </svg>
        </div>

        <!-- Radar -->
        <div id="radarWrapperMP" class="radar-wrapper" style="bottom:15px; right:15px; left:auto; top:auto;">
            <div class="radar-title">COP RADAR</div>
            <canvas id="canvasRadarMP" class="radar-box" width="150" height="150"></canvas>
        </div>

        <!-- Level guide -->
        <div id="gyroLevelContainer" class="gyro-level-container" style="display:flex;">
            <div class="level-circle"></div>
            <div class="level-dot" id="gyroLevelDot" style="transform: translate(-50%, -50%);"></div>
            <div class="level-status" id="gyroLevelStatus" style="font-size:9px;">📐 カメラレベル補正OK (手持ちシミュレート)</div>
        </div>

        <div id="autoRecCountdown" class="auto-rec-countdown" style="display:none;">3</div>
    </div>

    <!-- Simulator Control Box (Select which results to simulate) -->
    <div class="simulator-selector-panel">
        <h4>🧪 シミュレーター診断結果設定</h4>
        <div class="sim-options">
            <label class="sim-radio-label">
                <input type="radio" name="simResult" value="neutral" checked>
                🟢 正常・ニュートラル姿勢
            </label>
            <label class="sim-radio-label">
                <input type="radio" name="simResult" value="pelvic_tilt">
                🔴 骨盤前傾（反り腰/前傾 12°）
            </label>
            <label class="sim-radio-label">
                <input type="radio" name="simResult" value="unbalanced">
                🔵 左右非対称（左荷重 42% / 右 58%）
            </label>
            <label class="sim-radio-label">
                <input type="radio" name="simResult" value="high_sway">
                🟡 重心動揺過多（COPブレ大 1,980 px²）
            </label>
        </div>
    </div>

    <!-- Controls Panel -->
    <div id="controlsBox">
        <div id="settingsWrapper" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; width: 100%;">
            <div class="input-group">
                <span class="prefix">選手名/ID</span>
                <input type="text" id="patientName" value="デモアスリート" style="background:transparent; border:none; color:var(--accent-teal); font-weight:700; width:110px; outline:none;">
            </div>

            <div class="input-group">
                <span class="prefix">身長</span>
                <input type="number" id="patientHeight" value="172" style="width:50px;">
                <span class="suffix">cm</span>
            </div>
            
            <button id="calibrateMatBtn" class="purple-btn">📏 マット校正済(45cm)</button>

            <select id="modeSelect" class="mode-dropdown" style="padding:4px 10px; border-radius:8px;">
                <option value="front">🧍 静止前面アライメント</option>
                <option value="l_side">🧍 静止左側面アライメント</option>
                <option value="dyn_overhead">🏋️ OHS 動作評価</option>
            </select>

            <select id="durationSelect">
                <option value="3000">⏱️ 3秒</option>
                <option value="5000">⏱️ 5秒</option>
            </select>
        </div>

        <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
            <button id="startBtn" class="blue-btn" style="padding:10px 30px; border-radius:20px; border:none; background:var(--accent-blue); color:#000; font-weight:700; cursor:pointer;">📷 カメラテスト起動</button>
            <button id="recBtn" class="red-btn" style="padding:10px 30px; border-radius:20px; border:none; background:var(--accent-red); color:#fff; font-weight:700; cursor:pointer;">🔴 測定シミュレート開始</button>
        </div>
    </div>
</div>

<script>
    // Simulator Interactive Logic
    const recBtn = document.getElementById('recBtn');
    const startBtn = document.getElementById('startBtn');
    const modeSelect = document.getElementById('modeSelect');
    const timerDisplay = document.getElementById('timerDisplay');
    const autoRecCountdown = document.getElementById('autoRecCountdown');
    const canvasRadar = document.getElementById('canvasRadarMP');
    const ctxRadar = canvasRadar.getContext('2d');
    
    // Draw initial radar grid
    drawRadar(ctxRadar, 300);

    // Deep link query check
    const urlParams = new URLSearchParams(window.location.search);
    const initialMode = urlParams.get('mode');
    const autoStart = urlParams.get('autoStart');
    const theme = urlParams.get('theme');

    if (theme === 'light') {
        document.body.classList.add('theme-light');
    }

    if (initialMode) {
        modeSelect.value = initialMode;
        updateMockSkeleton(initialMode);
    }
    
    modeSelect.addEventListener('change', (e) => {
        updateMockSkeleton(e.target.value);
    });

    if (autoStart === 'true') {
        setTimeout(() => {
            triggerMockCapture();
        }, 1000);
    }

    startBtn.addEventListener('click', () => {
        alert("カメラプレビューを起動しました（モック）。測定を行えます。");
    });

    recBtn.addEventListener('click', () => {
        triggerMockCapture();
    });

    function updateMockSkeleton(mode) {
        const spine = document.getElementById('spineLine');
        const pelvicStatus = document.getElementById('pelvicStatus');
        const scaleStatus = document.getElementById('scaleStatus');
        const skeleton = document.getElementById('skeletonOverlay');

        scaleStatus.innerText = "📏 校正済 (1px = 0.152cm)";

        if (mode === 'l_side') {
            pelvicStatus.innerText = "📐 骨盤傾斜: +12°";
            // Set radio automatically to pelvic tilt simulator for convenience
            document.querySelector('input[value="pelvic_tilt"]').checked = true;
            // Morph skeleton to side profile representation
            skeleton.style.transform = 'translate(-50%, -50%) rotateY(80deg)';
        } else {
            pelvicStatus.innerText = "📐 骨盤傾斜: 0°";
            if (mode === 'dyn_overhead') {
                document.querySelector('input[value="unbalanced"]').checked = true;
            }
            skeleton.style.transform = 'translate(-50%, -50%) rotateY(0deg)';
        }
    }

    function triggerMockCapture() {
        let count = 3;
        autoRecCountdown.innerText = count;
        autoRecCountdown.style.display = 'block';
        recBtn.disabled = true;

        const countdownInterval = setInterval(() => {
            count--;
            if (count > 0) {
                autoRecCountdown.innerText = count;
            } else {
                clearInterval(countdownInterval);
                autoRecCountdown.style.display = 'none';
                startRecordingSim();
            }
        }, 800);
    }

    function startRecordingSim() {
        timerDisplay.innerText = "REC 3.0s";
        timerDisplay.style.display = 'block';

        let recordTime = 3.0;
        const recordInterval = setInterval(() => {
            recordTime -= 0.5;
            timerDisplay.innerText = `REC ${recordTime.toFixed(1)}s`;
            
            // Draw simulated sway points
            const simType = document.querySelector('input[name="simResult"]:checked').value;
            let offset = 0;
            if (simType === 'unbalanced') offset = 18;
            if (simType === 'high_sway') offset = Math.sin(Date.now() / 100) * 35;
            
            drawRadar(ctxRadar, simType === 'high_sway' ? 1980 : 700, offset);

            if (recordTime <= 0) {
                clearInterval(recordInterval);
                timerDisplay.style.display = 'none';
                recBtn.disabled = false;
                completeMeasurement();
            }
        }, 500);
    }

    function completeMeasurement() {
        const simType = document.querySelector('input[name="simResult"]:checked').value;
        const mode = modeSelect.value;

        // Construct mock metrics based on selection
        let tilt = 0;
        let wb = { total: { L: 50.2, R: 49.8 } };
        let sway = { swayArea: 480.0, pathLength: 90.0, swaySpeed: 30.0, avgDeviationX: 0.2 };

        if (simType === 'pelvic_tilt') {
            tilt = 12;
            sway.swayArea = 850;
        } else if (simType === 'unbalanced') {
            wb = { total: { L: 42.0, R: 58.0 } };
            sway.swayArea = 1450;
            sway.avgDeviationX = 8.5;
        } else if (simType === 'high_sway') {
            sway.swayArea = 1980;
            sway.pathLength = 320;
            sway.swaySpeed = 106.6;
        }

        const sessionData = {
            id: "sess_mock_" + Date.now(),
            timestamp: Date.now(),
            patientName: document.getElementById('patientName').value || "デモアスリート",
            mode: mode,
            height: parseFloat(document.getElementById('patientHeight').value) || 170,
            footSize: 26,
            pelvicTilt: tilt,
            pxToCmRatio: 0.152,
            expertComment: "",
            expertExercises: ""
        };

        const metrics = {
            mode: mode,
            pelvicTilt: tilt,
            weightBearing: wb,
            swayMetrics: sway
        };

        // Notify parent portal window!
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({
                type: 'MEASUREMENT_COMPLETE',
                session: sessionData,
                metrics: metrics
            }, '*');
            
            alert(`【測定シミュレーション完了】\n\n診断データを統合ポータルへ送信しました。\nポータル画面の「診断データ連動枠（広告）」および「コミュニティ添付」が自動更新されます。`);
        } else {
            alert(`【測定完了（単体実行）】\n左右荷重: 左 ${wb.total.L}% / 右 ${wb.total.R}%\n骨盤傾斜: ${tilt}°\n動揺面積: ${sway.swayArea} px²`);
        }
    }

    function drawRadar(ctx, areaVal, offset = 0) {
        const w = 150, h = 150;
        ctx.clearRect(0, 0, w, h);
        
        ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
        ctx.lineWidth = 1;
        [25, 50, 75].forEach(r => {
            ctx.beginPath(); ctx.arc(w/2, h/2, r, 0, 2*Math.PI); ctx.stroke();
        });
        ctx.beginPath();
        ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
        ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
        ctx.stroke();

        // Draw Simulated sway path
        ctx.save();
        ctx.translate(w/2 + offset, h/2 - 5);
        ctx.strokeStyle = areaVal > 1500 ? '#ff5252' : '#39ff14';
        ctx.lineWidth = 1.5;
        ctx.fillStyle = areaVal > 1500 ? 'rgba(255,82,82,0.08)' : 'rgba(57,255,20,0.08)';
        ctx.beginPath();
        const rX = Math.sqrt(areaVal) * 0.9;
        const rY = rX * 0.7;
        ctx.ellipse(0, 0, Math.min(65, rX), Math.min(50, rY), 0.2, 0, 2*Math.PI);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
    }
</script>
</body>
</html>
